windowrule = float on, match:class com.github.unrud.VideoDownloader
windowrule = float on, match:class io.gitlab.adhami3310.Impression

windowrule = group deny, no_blur on, match:float 1
windowrule = no_blur on, match:float false
windowrule = no_dim on, opacity 0.5 override 0.5 override 0.5 override, match:class com.q.bg
windowrule = group deny, float on, size 540 380, pin on, match:title –ö–į—Ä—ā–ł–Ĺ–ļ–į –≤ –ļ–į—Ä—ā–ł–Ĺ–ļ–Ķ
windowrule = group deny, float on, size 720 380, pin on, match:class hyprland-share-picker
windowrule = group deny, float on, size 650 340, move ((monitor_w*0.35)) (44), pin on, match:class org.pulseaudio.pavucontrol
windowrule = group deny, float on, size 460 270, pin on, match:title Discord Popout
windowrule = render_unfocused on, match:class kitty-bg

