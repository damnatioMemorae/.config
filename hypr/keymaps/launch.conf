$mainMod     = Super

$browser     = firefox
$browser     = librewolf
$ds          = vesktop
$tg          = telegram-desktop
$vb          = virtualbox
$termTiled   = ghostty
$termFloat   = ghostty
# $termTiled   = kitty
# $termFloat   = kitty
# $kFloat      = ~/.config/kitty/float.conf -o font_size=10 -o window_padding_width=8

#───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
# TILED

bind = $mainMod ,T      ,exec ,[tiled] $tg
bind = $mainMod ,B      ,exec ,[tiled] $browser
bind = $mainMod ,Return ,exec ,[tiled] $termTiled

#───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
# FLOAT

bind = $mainMod ALT ,T      ,exec ,[float; size 380 880; center] $tg
bind = $mainMod ALT ,Return ,exec ,[float; size 740 380: center] $termFloat

#───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
# SCRIPTS

bind = $mainMod       ,P     ,exec ,lua $scrPath/lua/hyprpicker.lua
bind = $mainMod       ,I     ,exec ,pkill -x rofi || $scrPath/cpu m
bind = $mainMod       ,O     ,exec ,pkill -x rofi || $scrPath/gpu m
bind = $mainMod       ,S     ,exec ,pkill -x rofi || $scrPath/shaders list
bind = $mainMod       ,Y     ,exec ,pkill -x rofi || $scrPath/cliphist c
bind = SHIFT          ,Space ,exec ,pkill -x rofi || $scrPath/rofilaunch
bind = $mainMod SHIFT ,W     ,exec ,pkill -x rofi || $scrPath/swwwallselect
bind = $mainMod       ,W     ,exec ,pkill -x rofi || $scrPath/wifimenu -o i
bind = $mainMod SHIFT ,T     ,exec ,pkill -x rofi || $scrPath/themeselect
bind = $mainMod       ,T     ,exec ,swaync-client -t

bind = $mainMod ALT ,Up   ,exec ,lua $scrPath/lua/waybar.lua set left
bind = $mainMod ALT ,Down ,exec ,lua $scrPath/lua/waybar.lua set bottom
