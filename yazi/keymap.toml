[mgr]
keymap = [
        { on = ["!",],           run = "shell --interactive", desc = "Open shell" },
        { on = ["<Esc>"],        run = "escape",  desc = "Exit visual mode, clear selected, or cancel search" },
        { on = ["q"],            run = "quit",    desc = "Close the current tab, or quit if it is last tab" },
        { on = ["Q"],            run = "close",   desc = "Exit the process" },
        { on = ["<C-z>"],        run = "suspend", desc = "Suspend the process" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # NAVIGATION

        # { on = ["h"],            run = "back",     desc = "Go back to the previous directory" },
        { on = ["j"],            run = "arrow 1",  desc = "Move cursor down" },
        { on = ["k"],            run = "arrow -1", desc = "Move cursor up" },
        # { on = ["l"],            run = "forward",  desc = "Go forward to the next directory" },
        # { on = ["l"],            run = "open",     desc = "Go forward to the next directory" },

        { on = ["h"],            run = ["leave", "escape --visual --select"], desc = "Go back to the parent directory" },
        # { on = ["l"],            run = ["enter", "escape --visual --select"], desc = "Enter the child directory" },
        { on = ["<C-u>"],        run = "arrow -50%",  desc = "Move cursor up half page" },
        { on = ["<C-d>"],        run = "arrow 50%",   desc = "Move cursor down half page" },
        { on = ["<C-b>"],        run = "arrow -100%", desc = "Move cursor up one page" },
        { on = ["<C-f>"],        run = "arrow 100%",  desc = "Move cursor down one page" },
        { on = ["<C-k>"],        run = "peek -5",     desc = "Peek up 5 units in the preview" },
        { on = ["<C-j>"],        run = "peek 5",      desc = "Peek down 5 units in the preview" },
        { on = ["<Up>"],         run = "arrow -1",    desc = "Move cursor up" },
        { on = ["<Down>"],       run = "arrow 1",     desc = "Move cursor down" },
        { on = ["<Left>"],       run = "leave",       desc = "Go back to the parent directory" },
        { on = ["<Right>"],      run = "enter",       desc = "Enter the child directory" },
        { on = ["g", "g"],       run = "arrow top",   desc = "Move cursor to the top" },
        { on = ["G"],            run = "arrow bot",   desc = "Move cursor to the bottom" },
        { on = [",", "r"],       run = "shell -- ya emit cd '$(git rev-parse --show-toplevel)'", desc = "cd to the root of the current repository" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # SELECTION

        { on = ["<Space>"],      run = ["toggle", "arrow 1"],     desc = "Toggle the current selection state" },
        { on = ["<C-Space>"],    run = ["toggle", "arrow -1"],    desc = "Toggle the current selection state" },
        { on = ["v"],            run = "visual_mode",             desc = "Enter visual mode (selection mode)" },
        { on = ["V"],            run = "visual_mode --unset",     desc = "Enter visual mode (unset mode)" },
        { on = ["<C-v>"],        run = "toggle_all --state=on",   desc = "Select all files" },
        { on = ["<C-r>"],        run = "toggle_all",              desc = "Inverse selection of all files" },

        #───────────────────────────────────────────────────────────────────────
        # OPERATION

        { on = ["<Enter>"],      run = "open",               desc = "Open the selected files" },
        { on = ["<S-Enter>"],    run = "open --interactive", desc = "Open the selected files interactively" },
        { on = ["x"],            run = ["yank --cut", "escape --visual --select"], desc = "Cut the selected files" },
        { on = ["P"],            run = "paste --force",      desc = "Paste the files (overwrite if the destination exists)" },
        { on = ["-"],            run = "link",               desc = "Symlink the absolute path of files" },
        { on = ["_"],            run = "link --relative",    desc = "Symlink the relative path of files" },
        { on = ["d"],            run = ["remove", "escape --visual --select"], desc = "Move the files to the trash" },
        { on = ["D"],            run = ["remove --permanently", "escape --visual --select"], desc = "Permanently delete the files" },
        { on = ["a"],            run = "create",              desc = "Create a file or directory (ends with / for directories)" },
        { on = ["r"],            run = "rename",              desc = "Rename a file or directory" },
        { on = [";"],            run = "shell --interactive", desc = "Run a shell command" },
        { on = [":"],            run = "shell --interactive",       desc = "Run a shell command (block the UI until the command finishes)" },
        { on = ["."],            run = "hidden toggle",       desc = "Toggle the visibility of hidden files" },
        { on = ["/"],            run = "search fd",           desc = "Search files by name using fd" },
        { on = ["S"],            run = "search rg",           desc = "Search files by content using ripgrep" },
        { on = ["<C-s>"],        run = "search none",         desc = "Cancel the ongoing search" },
        { on = ["z"],            run = "plugin zoxide",       desc = "Jump to a directory using zoxide" },
        { on = ["Z"],            run = "plugin fzf",          desc = "Jump to a directory, or reveal a file using fzf" },
        { on = ["E"],            run = "plugin eza-preview",  desc = "Toggle tree/list dir preview" },
        { on = ["<C-t>"],        run = '''shell "$SHELL" --confirm''', desc = "Open shell here" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # LINEMODE

        { on = ["m", "s"],       run = "linemode size",         desc = "Set linemode to size" },
        { on = ["m", "p"],       run = "linemode permissions",  desc = "Set linemode to permissions" },
        { on = ["m", "m"],       run = "linemode mtime",        desc = "Set linemode to mtime" },
        { on = ["m", "n"],       run = "linemode none",         desc = "Set linemode to none" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # COPY

        { on = ["c", "c"],       run = "copy path"               ,desc = "Copy the absolute path" },
        { on = ["c", "d"],       run = "copy dirname"            ,desc = "Copy the path of the parent directory" },
        { on = ["c", "f"],       run = "copy filename"           ,desc = "Copy the name of the file" },
        { on = ["c", "n"],       run = "copy name_without_ext"   ,desc = "Copy the name of the file without the extension" },
        { on = ["y"],            run = "yank"                    ,desc = "Yank the file" },
        { on = ["p"],            run = "paste"                   ,desc = "Paste the file" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # FIND

        # { on = ["s"],            run = "find --smart" },
        { on = ["?"],            run = "find --previous --smart" },
        { on = ["n"],            run = "find_arrow" },
        { on = ["N"],            run = "find_arrow --previous" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # SORTING

        { on = [",", "a"],       run = "sort alphabetical --dir_first",           desc = "Sort alphabetically" },
        { on = [",", "A"],       run = "sort alphabetical --reverse --dir_first", desc = "Sort alphabetically (reverse)" },
        { on = [",", "c"],       run = "sort created --dir_first",                desc = "Sort by creation time" },
        { on = [",", "C"],       run = "sort created --reverse --dir_first",      desc = "Sort by creation time (reverse)" },
        { on = [",", "m"],       run = "sort mtime --dir_first",                  desc = "Sort by modified time" },
        { on = [",", "M"],       run = "sort mtime --reverse --dir_first",        desc = "Sort by modified time (reverse)" },
        { on = [",", "n"],       run = "sort natural --dir_first",                desc = "Sort naturally" },
        { on = [",", "N"],       run = "sort natural --reverse --dir_first",      desc = "Sort naturally (reverse)" },
        { on = [",", "S"],       run = "sort size --dir_first",                   desc = "Sort by size" },
        { on = [",", "s"],       run = "sort size --reverse --dir_first",         desc = "Sort by size (reverse)" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # TABS

        { on = ["<Tab>"] ,run = "tab_create --current"     ,desc = "Create a new tab using the current path" },
        { on = ["1"]     ,run = "tab_switch 0"             ,desc = "Switch to the first tab" },
        { on = ["2"]     ,run = "tab_switch 1"             ,desc = "Switch to the second tab" },
        { on = ["3"]     ,run = "tab_switch 2"             ,desc = "Switch to the third tab" },
        { on = ["4"]     ,run = "tab_switch 3"             ,desc = "Switch to the fourth tab" },
        { on = ["5"]     ,run = "tab_switch 4"             ,desc = "Switch to the fifth tab" },
        { on = ["6"]     ,run = "tab_switch 5"             ,desc = "Switch to the sixth tab" },
        { on = ["7"]     ,run = "tab_switch 6"             ,desc = "Switch to the seventh tab" },
        { on = ["8"]     ,run = "tab_switch 7"             ,desc = "Switch to the eighth tab" },
        { on = ["9"]     ,run = "tab_switch 8"             ,desc = "Switch to the ninth tab" },
        { on = ["H"]     ,run = "tab_switch -1 --relative" ,desc = "Switch to the previous tab" },
        { on = ["L"]     ,run = "tab_switch 1 --relative"  ,desc = "Switch to the next tab" },
        { on = ["{"]     ,run = "tab_swap -1"              ,desc = "Swap the current tab with the previous tab" },
        { on = ["}"]     ,run = "tab_swap 1"               ,desc = "Swap the current tab with the next tab" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # TASKS

        { on = ["w"],            run = "tasks:show",       desc = "Show the tasks manager" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # GOTO

        { on = ["g", "/"],       run = "cd /",                                desc = "Go to the Root directory" },
        { on = ["g", "h"],       run = "cd ~",                                desc = "Go to the Home directory" },
        { on = ["g", "c"],       run = "cd ~/.config",                        desc = "Go to the Config directory" },
        { on = ["g", "d"],       run = "cd ~/Downloads",                      desc = "Go to the Downloads directory" },
        { on = ["g", "p"],       run = "cd ~/Pictures",                       desc = "Go to the Pictures directory" },
        { on = ["g", "v"],       run = "cd ~/Videos/",                        desc = "Go to the Pictures directory" },
        { on = ["g", "s"],       run = "cd ~/.servers",                       desc = "Go to the Downloads directory" },
        { on = ["g", "t"],       run = "cd /tmp",                             desc = "Go to the Temporary directory" },
        { on = ["g", "M"],       run = "cd ~/.local/share/multimc/instances", desc = "Go to the multimc directory" },
        { on = ["g", "m"],       run = "cd ~/Music",                          desc = "Go to the Multimc directory" },
        { on = ["g", ";"],       run = "cd /run/media",                       desc = "Go to drives" },
        { on = ["g", "<Space>"], run = "cd --interactive",                    desc = "Go to a directory interactively" },

        { on = ["<Tab>"],        run = "spot", desc = "Spot hovered file" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # HELP

        { on = ["~"],            run = "help", desc = "Open help" },
]

prepend_keymap = [
        { on = ["'"],            run = "plugin mount" },
        # { on = ["Y"],            run = [ '''shell --confirm 'for path in "$@"; do echo "file://$path"; done | wl-copy -t text/uri-list' ''', "yank" ] },
        { on = ["P"],            run = "plugin smart-paste" },
        { on = ["J"],            run = "plugin parent-arrow 1" },
        { on = ["K"],            run = "plugin parent-arrow -1" },
        { on = ["l"],            run = "plugin smart-enter" },
        { on = ["1"],            run = "plugin toggle-pane min-parent" },
        { on = ["2"],            run = "plugin toggle-pane min-current" },
        { on = ["3"],            run = "plugin toggle-pane min-preview" },
        { on = ["7"],            run = "plugin toggle-pane max-parent" },
        { on = ["8"],            run = "plugin toggle-pane max-current" },
        { on = ["9"],            run = "plugin toggle-pane max-preview" },
        { on = ["s"],            run = "plugin smart-filter" },
        { on = ["<C-m>"],        run = "plugin chmod" },
        # { on = ["C"],            run = [ '''shell --confirm 'zip -r "'$@'.zip" "$1"' ''' ] },
        # { on = ["<Right>"],      run = "plugin fuse-archive --args=mount",   desc = "Enter or Mount selected archive" },
        # { on = ["<Left>"],       run = "plugin fuse-archive --args=unmount", desc = "Leave or Unmount selected archive" },
        # { on = "r",              run = ["escape --visual", "plugin thunar-bulk-rename"], desc = "Rename selected file(s) (via thunar)" },
        { on = [ "<C-s>" ],      run = ["plugin telegram-send"], desc = "Send with Telegram" },
        { on = [ "<A-y>" ],      run = ["plugin copy-file-contents"], desc = "Copy contents of file" },
        { on = [ "+" ],          run = ["plugin zoom 1"], desc = "Zoom in" },
        { on = [ "-" ],          run = ["plugin zoom -1"], desc = "Zoom out" },
        { on = ["Y"],            run = "plugin ucp copy notify"  ,desc = "Universal copy" },
        # { on = ["p"],            run = "plugin ucp paste notify" ,desc = "Universal paste" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # UNDO/REDO

        { on = ["u"]            ,run = "undo", desc = "Undo the last operation" },
        { on = ["U"]            ,run = "redo", desc = "Redo the last operation" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # HELP

        { on = ["~"],            run = "help", desc = "Open help" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # TAGS

        # { on = [ "t", "t", "k" ] ,run = "plugin simple-tag -- toggle-tag" ,desc = "Toggle a tag (press any key)" },

        { on = [ "`" ] ,run = "plugin simple-tag -- toggle-tag --keys=!1q" ,desc = "Toggle a tag (press any key)" },
        { on = [ "`" ] ,run = "plugin simple-tag -- toggle-tag --keys=*"   ,desc = "Toggle a tag (press any key)" },
        { on = [ "`" ] ,run = "plugin simple-tag -- toggle-tag --key=*"    ,desc = "Toggle a tag (press any key)" },

        # { on = [ "t", "t", "k" ] ,run = "plugin simple-tag -- toggle-tag --input" ,desc = "Toggle a tag (press any key)" },
]


[completion]
keymap = [

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # CLOSE

        { on = ["<Esc>"]        ,run = "close"          ,desc = "Cancel completion" },
        { on = ["<Tab>"]        ,run = "close --submit" ,desc = "Submit the completion" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # MOVE

        { on = ["<A-k>"],        run = "arrow -1", desc = "Move cursor up" },
        { on = ["<A-j>"],        run = "arrow 1",  desc = "Move cursor down" },
        { on = ["<Up>"],         run = "arrow -1", desc = "Move cursor up" },
        { on = ["<Down>"],       run = "arrow 1",  desc = "Move cursor down" },
        { on = ["~"],            run = "help",     desc = "Open help" },
]

[help]
keymap = [
        { on = ["<Esc>"],        run = "escape",   desc = "Clear the filter, or hide the help" },
        { on = ["q"],            run = "close",    desc = "Exit the process" },
        # { on = ["<C-q>"],        run = "close",    desc = "Hide the help" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # NAVIGATION

        { on = ["k"],            run = "arrow -1", desc = "Move cursor up" },
        { on = ["j"],            run = "arrow 1",  desc = "Move cursor down" },
        { on = ["K"],            run = "arrow -5", desc = "Move cursor up 5 lines" },
        { on = ["J"],            run = "arrow 5",  desc = "Move cursor down 5 lines" },
        { on = ["<Up>"],         run = "arrow -1", desc = "Move cursor up" },
        { on = ["<Down>"],       run = "arrow 1",  desc = "Move cursor down" },

        #───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
        # FILTERING

        { on = ["/"],            run = "filter",   desc = "Apply a filter for the help items" },
]
